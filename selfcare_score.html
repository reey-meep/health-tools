<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Daily Score">
<title>Daily Self-Care Score</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
:root {
 --cream: #faf7f2;
 --cream2: #f4efe6;
 --cream3: #ede6d8;
 --card: rgba(255,255,255,0.92);
 --card-border: rgba(212,200,180,0.55);
 --border: #e8dfd0;
 --border2: #d4c8b4;
 --text: #2d2418;
 --text2: #6b5844;
 --text3: #a08870;
 --leaf: #4a7c59;
 --leaf-light: #7ab088;
 --sage: #6a9470;
 --gold: #c4922a;
 --gold-light: #e8c97e;
 --blossom: #c4607a;
 --lavender: #7a6cba;
 --lavender-light: #b0a8e0;
 --shadow: 0 2px 12px rgba(44,36,24,0.07);
 --shadow-lg: 0 6px 28px rgba(44,36,24,0.1);
 --r: 16px;
 --rl: 20px;
 --serif: 'Lora', Georgia, serif;
 --sans: 'DM Sans', sans-serif;
 --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--sans); background: var(--cream); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background-color 1.8s ease; }

/* BG LAYER */
#bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: background 1.8s ease; }

/* NAV */
.nav { display: flex; background: rgba(250,247,242,0.9); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; overflow-x: auto; scrollbar-width: none; transition: background-color 1.8s ease; }
.nav::-webkit-scrollbar { display: none; }
.nav-btn { flex: 1; min-width: 55px; padding: 13px 4px 11px; font-size: 10px; font-weight: 500; color: var(--text3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; font-family: var(--mono); letter-spacing: .06em; text-transform: uppercase; transition: color .15s; }
.nav-btn.active { color: var(--leaf); border-bottom-color: var(--leaf); }

/* PAGES */
.page { display: none; position: relative; z-index: 1; padding: 1.25rem; max-width: 640px; margin: 0 auto; padding-bottom: 5.5rem; }
.page.active { display: block; }

/* SCORE CARD */
.score-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--rl); box-shadow: var(--shadow-lg); padding: 1.5rem 1.25rem 1.25rem; margin-bottom: 1rem; text-align: center; position: relative; overflow: hidden; }
.score-card-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--leaf-light), var(--gold-light), #f0c0c8); border-radius: var(--rl) var(--rl) 0 0; }
.score-date { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .875rem; }
.score-number { font-family: var(--serif); font-size: 68px; font-weight: 600; line-height: 1; margin-bottom: 2px; transition: color .5s; }
.score-denom { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: .5rem; }
.score-grade { font-family: var(--serif); font-size: 15px; font-style: italic; margin-bottom: .75rem; transition: color .5s; }
.pace-pill { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 4px 12px; border-radius: 99px; margin-bottom: .875rem; }
.pace-green { background: rgba(74,124,89,.1); color: var(--leaf); border: 1px solid rgba(74,124,89,.2); }
.pace-yellow { background: rgba(196,146,42,.1); color: var(--gold); border: 1px solid rgba(196,146,42,.2); }
.pace-red { background: rgba(180,70,60,.08); color: #b84640; border: 1px solid rgba(180,70,60,.18); }

/* XP */
.xp-row { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: .5rem; }
.level-pill { display: inline-flex; align-items: center; gap: 5px; background: rgba(122,108,186,.1); border: 1px solid rgba(122,108,186,.25); border-radius: 99px; padding: 4px 12px; font-family: var(--mono); font-size: 11px; color: var(--lavender); }
.streak-pill { display: inline-flex; align-items: center; gap: 4px; background: rgba(220,130,50,.1); border: 1px solid rgba(220,130,50,.22); border-radius: 99px; padding: 4px 10px; font-family: var(--mono); font-size: 11px; color: #c87838; }
.xp-bar-wrap { max-width: 180px; margin: 0 auto .25rem; }
.xp-track { height: 4px; background: var(--cream3); border-radius: 99px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--sage), var(--leaf)); border-radius: 99px; transition: width .8s cubic-bezier(.4,0,.2,1); }
.xp-lbl { font-family: var(--mono); font-size: 9px; color: var(--text3); text-align: center; margin-top: 3px; }
.ci-info { font-family: var(--mono); font-size: 10px; color: var(--text3); text-align: center; margin-top: .4rem; }

/* CHALLENGES */
.challenge-card { background: var(--card); border: 1px solid rgba(122,108,186,.2); border-radius: var(--r); padding: .875rem 1rem; margin-bottom: 7px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
.ch-icon-wrap { width: 38px; height: 38px; border-radius: 11px; background: linear-gradient(135deg, rgba(106,148,112,.15), rgba(74,124,89,.08)); display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
.ch-body { flex: 1; min-width: 0; }
.ch-eyebrow { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 2px; }
.ch-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.ch-desc { font-size: 11px; color: var(--text2); line-height: 1.4; margin-bottom: 5px; }
.ch-bar { height: 3px; background: var(--cream3); border-radius: 99px; overflow: hidden; }
.ch-bar-fill { height: 100%; background: linear-gradient(90deg, var(--sage), var(--leaf)); border-radius: 99px; transition: width .5s; }
.ch-status { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 3px; }
.ch-done .ch-status { color: var(--leaf); }
.ch-reward { font-family: var(--mono); font-size: 10px; color: var(--gold); white-space: nowrap; flex-shrink: 0; }
.wch-card { background: rgba(74,124,89,.04); border: 1px solid rgba(74,124,89,.18); border-radius: var(--r); padding: .75rem 1rem; margin-bottom: 1rem; }
.wch-eyebrow { font-family: var(--mono); font-size: 9px; color: var(--sage); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 3px; }
.wch-title { font-size: 13px; font-weight: 500; color: var(--text); }
.wch-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* SECTIONS */
.sec { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 9px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); margin: 1.25rem 0 .5rem; }
.sec-line { flex: 1; height: 1px; background: var(--border); }

/* TASKS */
.tasks { display: flex; flex-direction: column; gap: 6px; }
.task { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 10px 12px; cursor: pointer; user-select: none; box-shadow: var(--shadow); transition: all .15s; }
.task:active { transform: scale(.985); }
.task.on { background: rgba(74,124,89,.06); border-color: rgba(74,124,89,.28); }
.task.neg { border-color: rgba(180,70,60,.15); }
.task.neg.on { background: rgba(180,70,60,.05); border-color: rgba(180,70,60,.25); }
.chk { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; background: white; box-shadow: inset 0 1px 2px rgba(0,0,0,.06); }
.task.on .chk { background: var(--leaf); border-color: var(--leaf); animation: checkBounce .25s ease; }
.task.neg.on .chk { background: #b84640; border-color: #b84640; }
.chk svg { display: none; }
.task.on .chk svg { display: block; }
@keyframes checkBounce { 0%{transform:scale(0)} 60%{transform:scale(1.25)} 100%{transform:scale(1)} }
.t-name { font-size: 13px; color: var(--text2); flex: 1; line-height: 1.4; }
.task.on .t-name { color: var(--text3); }
.t-pts { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 99px; flex-shrink: 0; }
.pp { background: rgba(74,124,89,.1); color: var(--leaf); }
.np { background: rgba(180,70,60,.08); color: #b84640; }
.info-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 2px; flex-shrink: 0; opacity: .5; transition: opacity .15s; line-height: 1; }
.info-btn:hover { opacity: 1; color: var(--lavender); }

/* COLLAPSIBLES */
.col-header { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 10px 12px; cursor: pointer; margin-bottom: 5px; box-shadow: var(--shadow); }
.col-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
.col-count { font-family: var(--mono); font-size: 10px; color: var(--leaf); }
.col-arrow { font-size: 10px; color: var(--text3); transition: transform .2s; }
.col-arrow.open { transform: rotate(180deg); }
.col-body { display: none; padding: 0 0 4px 10px; }
.col-body.open { display: block; }
.subsec { font-size: 9px; color: var(--text3); font-family: var(--mono); letter-spacing: .08em; text-transform: uppercase; margin: .75rem 0 .3rem .5rem; }

/* FLOW CARDS */
.flow-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r); padding: .875rem 1rem; margin-bottom: 7px; cursor: pointer; box-shadow: var(--shadow); transition: all .15s; }
.flow-card:hover { box-shadow: var(--shadow-lg); border-color: var(--border2); }
.flow-card.has-data { border-color: rgba(74,124,89,.3); background: rgba(74,124,89,.03); }
.fc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.fc-title { font-size: 13px; font-weight: 500; color: var(--text); }
.fc-pts { font-family: var(--mono); font-size: 11px; color: var(--leaf); }
.fc-sub { font-size: 12px; color: var(--text3); line-height: 1.4; }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(44,36,24,.45); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: #fffef9; border: 1px solid var(--border); border-radius: 24px 24px 0 0; width: 100%; max-width: 640px; max-height: 92vh; overflow-y: auto; padding: 1rem 1.25rem 2.5rem; }
.modal-handle { width: 36px; height: 4px; background: var(--cream3); border-radius: 99px; margin: 0 auto 1.25rem; }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
.modal-title { font-family: var(--serif); font-size: 20px; font-weight: 500; }
.modal-close { background: var(--cream2); border: 1px solid var(--border); border-radius: 50%; width: 30px; height: 30px; color: var(--text3); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.q-label { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
.q-text { font-family: var(--serif); font-size: 19px; color: var(--text); margin-bottom: 1.25rem; line-height: 1.4; }
.opts-col { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1rem; }
.opt-btn { padding: 12px 14px; background: var(--cream); border: 1.5px solid var(--border); border-radius: 12px; font-size: 13px; font-family: var(--sans); cursor: pointer; text-align: left; color: var(--text2); transition: all .12s; }
.opt-btn:hover { border-color: var(--leaf); }
.opt-btn.sel { background: rgba(74,124,89,.08); border-color: var(--leaf); color: var(--leaf); font-weight: 500; }
.pills-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1rem; }
.pill-btn { padding: 7px 14px; background: var(--cream); border: 1.5px solid var(--border); border-radius: 99px; font-size: 12px; font-family: var(--mono); cursor: pointer; color: var(--text2); transition: all .12s; }
.pill-btn.sel { background: rgba(74,124,89,.08); border-color: var(--leaf); color: var(--leaf); }
.text-in { width: 100%; background: var(--cream); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 14px; font-family: var(--sans); color: var(--text); outline: none; resize: none; line-height: 1.6; margin-bottom: 1rem; min-height: 70px; }
.text-in:focus { border-color: var(--leaf); }
.num-in { background: var(--cream); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 12px; font-size: 18px; color: var(--text); font-family: var(--mono); outline: none; width: 120px; text-align: center; margin-bottom: 1rem; }
.next-btn { width: 100%; padding: 14px; background: var(--leaf); border: none; border-radius: 12px; color: white; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--sans); box-shadow: 0 4px 16px rgba(74,124,89,.22); margin-top: .5rem; transition: opacity .15s, transform .08s; }
.next-btn:hover { opacity: .9; }
.next-btn:active { transform: scale(.98); }
.next-btn:disabled { opacity: .3; cursor: default; transform: none; }
.back-btn { width: 100%; padding: 10px; background: none; border: none; font-size: 13px; color: var(--text3); cursor: pointer; margin-top: 6px; }
.flag-box { background: rgba(196,146,42,.07); border: 1px solid rgba(196,146,42,.22); border-radius: 10px; padding: 10px 12px; font-size: 12px; color: var(--gold); font-family: var(--mono); margin-bottom: .75rem; line-height: 1.55; }
.pts-preview { background: rgba(74,124,89,.06); border: 1px solid rgba(74,124,89,.18); border-radius: 10px; padding: 8px 12px; font-size: 12px; color: var(--leaf); font-family: var(--mono); margin-bottom: .75rem; text-align: center; }
.done-msg { text-align: center; padding: 1.5rem 0; }
.done-icon { font-size: 44px; margin-bottom: .875rem; }
.done-title { font-family: var(--serif); font-size: 22px; font-weight: 500; margin-bottom: 6px; }
.done-sub { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: .5rem; }
.done-pts { font-family: var(--serif); font-size: 28px; font-weight: 600; color: var(--leaf); margin: .5rem 0 .25rem; }

/* DRINK LOG */
.drink-entries { display: flex; flex-direction: column; gap: 5px; margin-bottom: .75rem; }
.drink-entry { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(74,124,89,.04); border: 1px solid rgba(74,124,89,.14); border-radius: 10px; }
.drink-name { font-size: 12px; flex: 1; color: var(--text2); }
.drink-pts { font-family: var(--mono); font-size: 10px; color: var(--leaf); }
.drink-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 15px; padding: 0 2px; }
.drink-type-btn { padding: 7px 13px; background: var(--card); border: 1px solid var(--card-border); border-radius: 99px; font-size: 11px; color: var(--text2); cursor: pointer; font-family: var(--mono); white-space: nowrap; box-shadow: var(--shadow); transition: all .12s; }
.drink-type-btn:hover { border-color: var(--leaf); color: var(--leaf); }

/* FAB */
.ci-fab { position: fixed; bottom: 1.5rem; right: 1.25rem; background: var(--leaf); border: none; border-radius: 99px; padding: 12px 18px; color: white; font-family: var(--mono); font-size: 11px; cursor: pointer; box-shadow: 0 4px 20px rgba(74,124,89,.32); z-index: 150; display: flex; align-items: center; gap: 6px; transition: all .15s; }
.ci-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(74,124,89,.38); }
.fab-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-light); }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.fab-dot.urgent { background: #e05040; animation: pulse 1.2s infinite; }

/* CI MODAL */
.ci-q { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--cream); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
.ci-q-text { font-size: 13px; color: var(--text2); }
.ci-btns { display: flex; gap: 5px; }
.ci-btn { font-family: var(--mono); font-size: 11px; padding: 5px 11px; border-radius: 8px; border: 1px solid var(--border); background: white; color: var(--text3); cursor: pointer; transition: all .1s; }
.ci-btn.yes-sel { background: rgba(180,70,60,.08); border-color: #b84640; color: #b84640; }
.ci-btn.no-sel { background: rgba(74,124,89,.08); border-color: var(--leaf); color: var(--leaf); }
.ci-action { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: rgba(180,70,60,.04); border: 1px solid rgba(180,70,60,.14); border-radius: 10px; margin-bottom: 6px; }
.ci-action.done-action { opacity: .5; }
.ci-action-text { flex: 1; font-size: 12px; color: var(--text2); line-height: 1.55; }
.ci-action-text strong { color: #b84640; font-weight: 500; display: block; margin-bottom: 2px; }
.ci-done-btn { font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border); background: white; color: var(--text3); cursor: pointer; white-space: nowrap; }
.ci-done-btn.done { background: rgba(74,124,89,.08); border-color: var(--leaf); color: var(--leaf); }

/* HISTORY */
.stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: .875rem; }
.stat-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r); padding: 1rem; box-shadow: var(--shadow); }
.stat-num { font-family: var(--serif); font-size: 28px; font-weight: 600; }
.stat-lbl { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 2px; }
.chart-wrap { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r); padding: 1rem; margin-bottom: .875rem; box-shadow: var(--shadow); }
.wbars { display: flex; gap: 6px; align-items: flex-end; height: 72px; margin-bottom: 5px; }
.wbar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.wbar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height .5s ease; }
.wbar-lbl { font-size: 9px; font-family: var(--mono); color: var(--text3); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-dow { font-size: 8px; font-family: var(--mono); color: var(--text3); text-align: center; padding-bottom: 3px; }
.cal-day { aspect-ratio: 1; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-family: var(--mono); }
.week-report { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r); padding: 1rem; margin-bottom: .875rem; box-shadow: var(--shadow); }
.week-grade { font-family: var(--serif); font-size: 42px; font-weight: 600; }
.flag-summary { background: rgba(196,146,42,.06); border: 1px solid rgba(196,146,42,.2); border-radius: var(--r); padding: .875rem 1rem; margin-bottom: .5rem; }
.flag-title { font-size: 12px; font-weight: 500; color: var(--gold); margin-bottom: 5px; }
.flag-item { font-size: 11px; color: var(--text2); font-family: var(--mono); padding: 3px 0; border-bottom: 1px solid var(--border); }
.flag-item:last-child { border-bottom: none; }

/* BADGES */
.badge-grid { display: flex; flex-direction: column; gap: 7px; }
.badge { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r); padding: .875rem 1rem; display: flex; align-items: center; gap: 12px; opacity: .3; box-shadow: var(--shadow); transition: all .3s; }
.badge.earned { opacity: 1; border-color: rgba(196,146,42,.35); background: rgba(196,146,42,.04); }
.badge-icon { font-size: 22px; flex-shrink: 0; }
.badge-name { font-size: 13px; font-weight: 500; color: var(--text); }
.badge-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* SETTINGS */
.settings-sec { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin: 1.25rem 0 .5rem; }
.setting-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.setting-row:last-child { border-bottom: none; }
.setting-name { font-size: 13px; flex: 1; color: var(--text2); }
.s-pts-wrap { display: flex; align-items: center; gap: 6px; }
.s-btn { background: white; border: 1px solid var(--border); border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 15px; color: var(--text3); display: flex; align-items: center; justify-content: center; transition: all .1s; }
.s-btn:hover { border-color: var(--leaf); color: var(--leaf); }
.s-val { font-family: var(--mono); font-size: 12px; font-weight: 500; min-width: 36px; text-align: center; }
.pos { color: var(--leaf); } .neg { color: #b84640; }
.s-toggle { width: 36px; height: 20px; background: var(--border2); border-radius: 99px; cursor: pointer; position: relative; transition: background .15s; border: none; flex-shrink: 0; }
.s-toggle.on { background: var(--leaf); }
.s-toggle::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: white; top: 3px; left: 3px; transition: left .15s; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
.s-toggle.on::after { left: 19px; }

// SCORING 
function calcScore(date){
 const cfg=getCfg();
 const checked=getChecked(date);
 const food=getFoodEntries(date);
 const flows=getFlowData(date);
 const ciEntries=getCIEntries(date);
 let pts=0;

 // checkboxes
 Object.entries({...cfg.tasks,...cfg.ns,...cfg.hobbies,...cfg.move}).forEach(([id,t])=>{
 if(t.active && checked[id]) pts+=t.pts;
 });

 // food entries
 food.forEach(e=>pts+=e.pts);

 // flow scores
 if(flows.sleep) pts+=flows.sleep.pts||0;
 if(flows.exercise) pts+=flows.exercise.pts||0;
 if(flows.weed) pts+=flows.weed.pts||0;

 // CI pts
 ciEntries.forEach(e=>pts+=(e.pts||0));

 // max for scaling
 const maxPts=calcMaxPts(cfg);
 const scaled=Math.round((pts/maxPts)*100);
 return Math.max(-20,Math.min(100,scaled));
}

function calcMaxPts(cfg){
 let m=0;
 Object.values({...cfg.tasks,...cfg.ns,...cfg.hobbies,...cfg.move}).forEach(t=>{if(t.active&&t.pts>0)m+=t.pts;});
 // add flow maxes
 const s=cfg.scales;
 m+=s.sleep_9plus+s.meal_base*3+s.meal_fresh_protein*3+s.walk_after_meal*3+s.t1_walk+s.water_still*8+s.water_nuun;
 return m;
}

}
function scoreGrade(s){
  if(s>=95)return'Perfect';
  if(s>=85)return'Excellent';
  if(s>=70)return'Great day';
  if(s>=55)return'Good';
  if(s>=40)return'Getting there';
  if(s>=25)return'Low day';
  if(s>=0)return'Starting out';
  return'Below zero';
}

// Realistic pacing curve — heavy morning logging, steady afternoon
const PACE_CURVE={7:0,8:25,9:42,10:50,11:55,12:60,13:64,14:67,15:70,16:73,17:76,18:80,19:84,20:88,21:93,22:100};
function getExpected(){
  const h=new Date().getHours(),m=new Date().getMinutes();
  if(h<DAYS_START)return 0;
  if(h>=DAYS_END)return 100;
  const base=PACE_CURVE[h]??0,next=PACE_CURVE[h+1]??100;
  return Math.round(base+(next-base)*(m/60));
}
function getPace(score){
  if(hr()<DAYS_START||hr()>=DAYS_END)return'green';
  const diff=score-getExpected();
  return diff>=-5?'green':diff>=-18?'yellow':'red';
}
function getPaceLabel(score){
  const p=getPace(score);
  const diff=score-getExpected();
  if(p==='green')return'On track';
  if(p==='yellow')return Math.abs(diff)+' pts behind';
  return Math.abs(diff)+' pts behind pace';
}

// SCORE-RESPONSIVE BACKGROUND 
function updateBackground(score) {
 const s = Math.max(0, Math.min(100, score));
 let bodyBg, radialTop;
 if (s < 20) {
 bodyBg = 'hsl(35,8%,96%)';
 radialTop = 'rgba(195,200,210,0.3)';
 } else if (s < 40) {
 const t=(s-20)/20;
 bodyBg = `hsl(${35+5*t},${8+4*t}%,96%)`;
 radialTop = `rgba(${Math.round(195+15*t)},${Math.round(200-10*t)},${Math.round(210-40*t)},${0.3-0.05*t})`;
 } else if (s < 60) {
 const t=(s-40)/20;
 bodyBg = `hsl(${40+6*t},${12+6*t}%,96%)`;
 radialTop = `rgba(${Math.round(210+20*t)},${Math.round(190+10*t)},${Math.round(170-10*t)},${0.25+0.05*t})`;
 } else if (s < 80) {
 const t=(s-60)/20;
 bodyBg = `hsl(${46+6*t},${18+8*t}%,97%)`;
 radialTop = `rgba(${Math.round(230+15*t)},${Math.round(200+10*t)},${Math.round(160-10*t)},${0.28+0.08*t})`;
 } else {
 const t=(s-80)/20;
 bodyBg = `hsl(${52+4*t},${26+6*t}%,${97+1*t}%)`;
 radialTop = `rgba(${Math.round(245+5*t)},${Math.round(210+10*t)},${Math.round(150-10*t)},${0.35+0.1*t})`;
 }
 document.body.style.backgroundColor = bodyBg;
 const layer = document.getElementById('bg-layer');
 if (layer) layer.style.background = `radial-gradient(ellipse 90% 45% at 50% -5%, ${radialTop}, transparent 70%)`;
 const nav = document.querySelector('.nav');
 if (nav) nav.style.backgroundColor = bodyBg.replace('hsl(','hsla(').replace(')',',0.9)');
}

function visibleSteps(){
 const steps=FLOWS[activeFlow]||[];
 return steps.filter(s=>!s.condition||s.condition(flowAnswers));
}

function renderFlow(){
 const steps=visibleSteps();
 if(flowStep>=steps.length){finalizeFlow();return;}
 const step=steps[flowStep];
 const pct=Math.round((flowStep/steps.length)*100);
 let html=`<div class="modal-header">
 <div><div class="modal-title">${flowTitle(activeFlow)}</div>
 <div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:3px">Step ${flowStep+1} of ${steps.length}</div></div>
 <button class="modal-close" onclick="closeModal()">×</button>
 </div>
 <div style="height:2px;background:var(--border2);border-radius:99px;margin-bottom:1.25rem">
 <div style="height:100%;width:${pct}%;background:var(--pdim);border-radius:99px;transition:width .3s"></div>
 </div>
 <div class="q-label">Question ${flowStep+1}</div>
 <div class="q-text">${step.q}</div>`;

 const saved=flowAnswers[step.id];

 if(step.type==='opts'){
 html+=`<div class="opts-col">`;
 step.opts.forEach(o=>{
 const sel=saved===o?'sel':'';
 html+=`<button class="opt-btn ${sel}" onclick="answerFlow('${step.id}','${o.replace(/'/g,"\\'")}')">${o}</button>`;
 });
 html+=`</div>`;
 if(saved) html+=`<button class="next-btn" onclick="nextFlow()">Continue </button>`;
 }
 else if(step.type==='pills'){
 html+=`<div class="pills-row">`;
 step.opts.forEach(o=>{
 const sel=saved===o?'sel':'';
 html+=`<button class="pill-btn ${sel}" onclick="answerFlow('${step.id}','${o.replace(/'/g,"\\'")}')">${o}</button>`;
 });
 html+=`</div>`;
 if(saved) html+=`<button class="next-btn" onclick="nextFlow()">Continue </button>`;
 }
 else if(step.type==='text'){
 html+=`<textarea class="text-in" id="flow-text" placeholder="${step.placeholder||''}">${saved||''}</textarea>`;
 html+=`<button class="next-btn" onclick="answerFlowText()">Continue </button>`;
 }
 else if(step.type==='multi'){
 const sel=saved||[];
 html+=`<div class="opts-col">`;
 step.opts.forEach(o=>{
 const isSel=sel.includes(o);
 html+=`<button class="opt-btn ${isSel?'sel':''}" onclick="toggleMulti('${step.id}','${o.replace(/'/g,"\\'")}')">${o}</button>`;
 });
 html+=`</div>`;
 html+=`<button class="next-btn" ${sel.length===0?'disabled':''} onclick="nextFlow()">Continue </button>`;
 }

 if(flowStep>0) html+=`<button class="back-btn" onclick="flowBack()"> Back</button>`;

 document.getElementById('modal-inner').innerHTML=html;
}

function flowTitle(t){
 return{sleep:'Sleep & last night',exercise:'Movement log',weed:'Substances',meal:'Meal log',reaction:'Reaction episode'}[t]||t;
}

function answerFlow(id,val){
 flowAnswers[id]=val;
 renderFlow();
 // auto advance after short delay for opts/pills
 setTimeout(()=>{
 if(activeFlow&&flowAnswers[id]===val) nextFlow();
 },320);
}

function answerFlowText(){
 const el=document.getElementById('flow-text');
 if(!el||!el.value.trim())return;
 flowAnswers[steps().id]=el.value.trim();
 nextFlow();
}
function steps(){return visibleSteps()[flowStep];}

function toggleMulti(id,val){
 if(!flowAnswers[id])flowAnswers[id]=[];
 const idx=flowAnswers[id].indexOf(val);
 if(idx>-1)flowAnswers[id].splice(idx,1);
 else flowAnswers[id].push(val);
 renderFlow();
}

function nextFlow(){
 flowStep++;
 renderFlow();
}
function flowBack(){
 if(flowStep>0){flowStep--;renderFlow();}
}

 const cfg=getCfg();
 const s=cfg.scales;
 const flows=getFlowData(today());
 let pts=0; let summary=''; let flags=[];

 if(activeFlow==='sleep'){
 const h=flowAnswers.hours||'';
 if(h.startsWith('9+'))pts+=s.sleep_9plus;
 else if(h.startsWith('8'))pts+=s.sleep_89;
 else if(h.startsWith('7'))pts+=s.sleep_78;

 const mealName=flowAnswers.name?.slice(0,40)||'Meal';

 return;
 }

function promptDrink(name,type,defaultOz){

 const cfg=getCfg();const s=cfg.scales;

 else if(type==='sparkling')pts=Math.round((oz/16)*s.sparkling_per_16*10)/10;
 else if(type==='ginger')pts=2.5;

 d[today()].drinks.push({name,type,oz,pts,time:nowTime()});
 saveStore(d);
 renderLog();
 if(document.getElementById('pg-today').classList.contains('active'))renderToday();
}

function calcStreak(sorted){
 let n=0;const t=new Date(today());
 for(let i=0;i<sorted.length;i++){const e=new Date(t);e.setDate(t.getDate()-i);if(sorted[i]===e.toISOString().slice(0,10))n++;else break;}
 return n;
}

// ── AUTH ──────────────────────────────────────────────────
async function supaFetch(path, opts={}) {
  const headers = {
    'apikey': SUPA_KEY,
    'Content-Type': 'application/json',
    ...opts.headers
  };
  if (_session) headers['Authorization'] = 'Bearer ' + _session.access_token;
  const res = await fetch(SUPA_URL + path, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.error_description || res.status);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function sendMagicLink(email) {
  const res = await fetch(SUPA_URL + '/auth/v1/otp', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, create_user: true })
  });
  if (!res.ok) throw new Error('Could not send magic link');
  return true;
}

async function getSession() {
  // Check URL for magic link token
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.slice(1));
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    if (access_token) {
      _session = { access_token, refresh_token };
      // Get user
      const user = await supaFetch('/auth/v1/user');
      _userId = user.id;
      localStorage.setItem('sc_session', JSON.stringify(_session));
      localStorage.setItem('sc_user_id', _userId);
      window.history.replaceState(null, '', window.location.pathname);
      return true;
    }
  }
  // Check stored session
  const stored = localStorage.getItem('sc_session');
  const storedUid = localStorage.getItem('sc_user_id');
  if (stored && storedUid) {
    try {
      _session = JSON.parse(stored);
      _userId = storedUid;
      // Verify session still valid
      const user = await supaFetch('/auth/v1/user');
      _userId = user.id;
      return true;
    } catch(e) {
      // Session expired - refresh
      try {
        const refreshed = await fetch(SUPA_URL + '/auth/v1/token?grant_type=refresh_token', {
          method: 'POST',
          headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: _session.refresh_token })
        });
        if (refreshed.ok) {
          const data = await refreshed.json();
          _session = { access_token: data.access_token, refresh_token: data.refresh_token };
          _userId = data.user.id;
          localStorage.setItem('sc_session', JSON.stringify(_session));
          localStorage.setItem('sc_user_id', _userId);
          return true;
        }
      } catch(e2) {}
      localStorage.removeItem('sc_session');
      localStorage.removeItem('sc_user_id');
      _session = null; _userId = null;
    }
  }
  return false;
}

function signOut() {

}

  try {
    await supaFetch('/rest/v1/food_entries', {
      method: 'POST',
      body: JSON.stringify({
        user_id: _userId,
        date,
        name: entry.name,
        pts: entry.pts,
        meal_type: entry.type || 'meal',
        flags: entry.flags || [],
        raw_answers: entry.rawAnswers || {}
      })
    });
  } catch(e) {
    console.warn('Food sync failed:', e.message);
  }
}

async function syncCheckin(date, entry) {
  if (!_userId) return;
  try {
    await supaFetch('/rest/v1/checkins', {
      method: 'POST',
      body: JSON.stringify({
        user_id: _userId,
        date,
        time: entry.time,
        answers: entry.answers,
        actions_completed: entry.actionsCompleted || [],
        pts: entry.pts,
        reaction_alert: !!entry.reactionAlert
      })
    });
  } catch(e) {
    console.warn('Checkin sync failed:', e.message);
  }
}

// Debounced day sync - batches rapid changes
function scheduleDaySync(date) {
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => syncDayToSupabase(date), 1500);
}

// ── LOAD FROM SUPABASE ────────────────────────────────────
async function loadFromSupabase() {
  if (!_userId) return;
  try {
    // Load last 30 days of scores
    const scores = await supaFetch(
      '/rest/v1/daily_scores?user_id=eq.' + _userId +
      '&order=date.desc&limit=30',
      { headers: { 'Range': '0-29' } }
    );
    if (scores && scores.length) {
      const store = getStore();
      scores.forEach(row => {
        store[row.date] = {
          checked: row.checked_tasks || {},
          flows: row.flows || {},
          drinks: row.drinks || [],
          enzymeFlags: row.enzyme_flags || [],
          ciPts: row.ci_pts || 0
        };
      });
      saveStore(store);
    }

    // Load food entries for last 30 days
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 30);
    const foods = await supaFetch(
      '/rest/v1/food_entries?user_id=eq.' + _userId +
      '&logged_at=gte.' + cutoff.toISOString() +
      '&order=logged_at.desc'
    );
    if (foods && foods.length) {
      const foodStore = getFood();
      foods.forEach(row => {
        if (!foodStore[row.date]) foodStore[row.date] = [];
        // Only add if not already present
        const exists = foodStore[row.date].some(e => 
          e.name === row.name && e.time === row.logged_at?.slice(11,16)
        );
        if (!exists) {
          foodStore[row.date].push({
            name: row.name,
            pts: row.pts,
            type: row.meal_type,
            flags: row.flags || [],
            rawAnswers: row.raw_answers || {},
            time: row.logged_at?.slice(11,16)
          });
        }
      });
      saveFood(foodStore);
    }

    // Load checkins
    const cis = await supaFetch(
      '/rest/v1/checkins?user_id=eq.' + _userId +
      '&logged_at=gte.' + cutoff.toISOString() +
      '&order=logged_at.desc'
    );
    if (cis && cis.length) {
      const ciStore = getCI();
      cis.forEach(row => {
        if (!ciStore[row.date]) ciStore[row.date] = [];
        const exists = ciStore[row.date].some(e => e.time === row.time);
        if (!exists) {
          ciStore[row.date].push({
            time: row.time,
            answers: row.answers,
            actionsCompleted: row.actions_completed || [],
            pts: row.pts
          });
        }
      });
      saveCI(ciStore);
    }
  } catch(e) {
    console.warn('Load from Supabase failed:', e.message);
  }
}

// ── PATTERN RECOGNITION ───────────────────────────────────
async function loadPatterns() {
  if (!_userId) return null;
  try {
    // Last 60 days of data
    const scores = await supaFetch(
      '/rest/v1/daily_scores?user_id=eq.' + _userId +
      '&order=date.desc&limit=60'
    );
    const foods = await supaFetch(
      '/rest/v1/food_entries?user_id=eq.' + _userId +
      '&order=logged_at.desc&limit=500'
    );
    const cis = await supaFetch(
      '/rest/v1/checkins?user_id=eq.' + _userId +
      '&order=logged_at.desc&limit=1000'
    );

    if (!scores || scores.length < 5) return { insufficientData: true };

    const patterns = {};

    // 1. Average score by day of week
    const byDow = {0:[],1:[],2:[],3:[],4:[],5:[],6:[]};
    scores.forEach(r => {
      const dow = new Date(r.date + 'T12:00:00').getDay();
      byDow[dow].push(r.score);
    });
    const dowLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    patterns.byDayOfWeek = Object.entries(byDow)
      .map(([d,arr]) => ({ day: dowLabels[d], avg: arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : null, n: arr.length }))
      .filter(d => d.n >= 2);
    patterns.bestDay = patterns.byDayOfWeek.reduce((a,b) => (b.avg||0)>(a.avg||0)?b:a, {avg:0});
    patterns.worstDay = patterns.byDayOfWeek.reduce((a,b) => (b.avg||100)<(a.avg||100)?b:a, {avg:100});

    // 2. Sleep correlation
    const sleepData = scores.filter(r => r.flows?.sleep?.rawAnswers?.hours).map(r => ({
      hours: r.flows.sleep.rawAnswers.hours,
      score: r.score
    }));
    if (sleepData.length >= 5) {
      const sleepGroups = {};
      sleepData.forEach(d => {
        const key = d.hours.split(' ')[0];
        if (!sleepGroups[key]) sleepGroups[key] = [];
        sleepGroups[key].push(d.score);
      });
      patterns.sleepImpact = Object.entries(sleepGroups).map(([h,arr]) => ({
        hours: h, avg: Math.round(arr.reduce((a,b)=>a+b,0)/arr.length), n: arr.length
      })).filter(d => d.n >= 2).sort((a,b) => b.avg-a.avg);
    }

    // 3. Most common checkin symptoms
    if (cis && cis.length) {
      const symCount = {};
      const symByHour = {};
      cis.forEach(ci => {
        const h = parseInt(ci.time?.split(':')[0] || '0');
        Object.entries(ci.answers || {}).forEach(([sym, val]) => {
          if (val === true) {
            symCount[sym] = (symCount[sym]||0) + 1;
            if (!symByHour[sym]) symByHour[sym] = {};
            symByHour[sym][h] = (symByHour[sym][h]||0) + 1;
          }
        });
      });
      patterns.topSymptoms = Object.entries(symCount)
        .sort((a,b) => b[1]-a[1]).slice(0,5)
        .map(([id, count]) => ({
          id,
          count,
          label: id.replace('_',' '),
          peakHour: Object.entries(symByHour[id]||{}).sort((a,b)=>b[1]-a[1])[0]?.[0]
        }));
    }

    // 4. Enzyme flag pattern
    const flagDays = scores.filter(r => r.enzyme_flags?.length > 0).length;
    patterns.enzymeCompliance = {
      totalDays: scores.length,
      flagDays,
      cleanDays: scores.length - flagDays,
      rate: Math.round(((scores.length - flagDays) / scores.length) * 100)
    };

    // 5. Score trend (last 7 vs previous 7)
    const last7 = scores.slice(0,7).map(r => r.score);
    const prev7 = scores.slice(7,14).map(r => r.score);
    if (last7.length >= 4 && prev7.length >= 4) {
      const avg7 = Math.round(last7.reduce((a,b)=>a+b,0)/last7.length);
      const avgPrev = Math.round(prev7.reduce((a,b)=>a+b,0)/prev7.length);
      patterns.trend = { current: avg7, previous: avgPrev, delta: avg7 - avgPrev };
    }

    // 6. Food triggers — days with reaction entries
    if (foods) {
      const reactionDays = [...new Set(
        foods.filter(f => f.meal_type === 'reaction').map(f => f.date)
      )];
      patterns.reactionDays = reactionDays.length;
      // Most common trigger from reaction raw_answers
      const triggerCount = {};
      foods.filter(f => f.meal_type === 'reaction').forEach(f => {
        const t = f.raw_answers?.trigger;
        if (t) triggerCount[t] = (triggerCount[t]||0) + 1;
      });
      patterns.topTrigger = Object.entries(triggerCount).sort((a,b)=>b[1]-a[1])[0];
    }

    return patterns;
  } catch(e) {
    console.warn('Pattern load failed:', e.message);
    return null;
  }
}

// ── AUTH UI ────────────────────────────────────────────────
function showAuthScreen() {
  const aw = document.getElementById('app-wrap');
  const as = document.getElementById('auth-screen');
  if(aw) aw.style.display = 'none';
  if(as) as.style.display = 'flex';
}
function showApp() {
  const aw = document.getElementById('app-wrap');
  const as = document.getElementById('auth-screen');
  if(aw) aw.style.display = 'block';
  if(as) as.style.display = 'none';
}

async function handleMagicLinkSubmit() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email) return;
  const btn = document.getElementById('auth-btn');
  const msg = document.getElementById('auth-msg');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    await sendMagicLink(email);
    msg.textContent = 'Check your email for a sign-in link.';
    msg.style.color = 'var(--leaf)';
    btn.textContent = 'Link sent';
  } catch(e) {
    msg.textContent = 'Error: ' + e.message;
    msg.style.color = '#b84640';
    btn.disabled = false;
    btn.textContent = 'Send link';
  }
}

// ── INIT ──────────────────────────────────────────────────
async function initApp() {
  try {
    const loggedIn = await getSession();
    if (loggedIn) {
      showApp();
      try { await loadFromSupabase(); } catch(e) { console.warn('Load failed:', e); }
      renderToday();
      patchSaveFunctions();
    } else {
      showAuthScreen();
    }
  } catch(e) {
    console.error('initApp error:', e);
    showAuthScreen();
  }
}

function patchSaveFunctions() {
  const _origSaveChecked = saveChecked;
  window.saveChecked = function(date, c) {
    _origSaveChecked(date, c);
    scheduleDaySync(date);
  };
  const _origSaveFlowData = saveFlowData;
  window.saveFlowData = function(date, f) {
    _origSaveFlowData(date, f);
    scheduleDaySync(date);
  };
  const _origSaveFoodEntries = saveFoodEntries;
  window.saveFoodEntries = function(date, entries) {
    _origSaveFoodEntries(date, entries);
    scheduleDaySync(date);
    // Sync latest entry
    const latest = entries[entries.length-1];
    if (latest) syncFoodEntry(date, latest);
  };
  const _origSaveCIEntry = saveCIEntry;
  window.saveCIEntry = function(date, entry) {
    _origSaveCIEntry(date, entry);
    syncCheckin(date, entry);
    scheduleDaySync(date);
  };
}

initApp();
